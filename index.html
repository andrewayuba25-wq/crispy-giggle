<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME</h1>
        
        <div class="controls">
            <p><strong>🟢 GREEN (You):</strong> Arrow Keys ↑/↓ or Mouse Movement</p>
            <p><strong>🔴 RED (Computer):</strong> Auto-AI Controlled</p>
            <p>First to 5 points wins! 🏆</p>
        </div>

        <div class="game-wrapper">
            <canvas id="pongCanvas" width="800" height="400"></canvas>
            <div class="game-over-message" id="gameOverMessage"></div>
        </div>

        <div class="scoreboard">
            <div class="score-item player">
                <div class="score-label">🟢 YOU</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-divider"></div>
            <div class="score-item computer">
                <div class="score-label">🔴 COMPUTER</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>

        <button id="resetBtn">🔄 New Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
